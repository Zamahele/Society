name: Society Build .NET 8

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Society.sln

      - name: Build
        run: dotnet build Society.sln --no-restore --configuration Release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish SocietyApp/SocietyApp.csproj --configuration Release --output ./publish

      - name: Upload published artifact
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: ./publish

  ftp-deploy:
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Download published artifact
        uses: actions/download-artifact@v4
        with:
          name: published-app
          path: ./publish

      - name: Prepare deployment files
        run: |
          echo "Configuring production settings..."
          sed -i 's/#{DB_SERVER}#/${{ secrets.DB_SERVER }}/g' ./publish/appsettings.Production.json
          sed -i 's/#{DB_USERNAME}#/${{ secrets.DB_USERNAME }}/g' ./publish/appsettings.Production.json
          sed -i 's/#{DB_PASSWORD}#/${{ secrets.DB_PASSWORD }}/g' ./publish/appsettings.Production.json

          echo "Creating log directory..."
          mkdir -p ./publish/logs

          echo "Deployment files prepared"

      - name: Take app offline
        run: |
          curl -s --ftp-create-dirs \
            -T ./publish/app_offline.htm \
            "ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}/gcweproperty.co.za/wwwroot/Society/app_offline.htm"
          echo "app_offline.htm uploaded — waiting 30s for IIS to release DLL locks..."
          sleep 30

      - name: Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /gcweproperty.co.za/wwwroot/Society/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            app_offline.htm

      - name: Bring app back online
        run: |
          curl -s -X "DELE /gcweproperty.co.za/wwwroot/Society/app_offline.htm" \
            "ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}"
          echo "app_offline.htm removed — app is back online"

      - name: Wait for application startup
        run: |
          echo "Waiting for application to initialize..."
          sleep 60

          MAX_ATTEMPTS=20
          ATTEMPT=1

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Testing application health (attempt $ATTEMPT/$MAX_ATTEMPTS)..."

            if curl -f -s --max-time 15 "https://gcweproperty.co.za/Society/health" > /dev/null 2>&1; then
              echo "Application is responding (HTTPS)"
              break
            elif curl -f -s --max-time 15 "http://gcweproperty.co.za/Society/health" > /dev/null 2>&1; then
              echo "Application is responding (HTTP)"
              break
            else
              echo "Not ready yet, waiting..."
              if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
                echo "Proceeding — verify manually"
              else
                sleep 20
              fi
            fi

            ATTEMPT=$((ATTEMPT + 1))
          done

      - name: Deployment Summary
        run: |
          echo "========================================="
          echo "SOCIETY APP DEPLOYMENT COMPLETED"
          echo "========================================="
          echo ""
          echo "Application URL: http://gcweproperty.co.za/Society/"
          echo "FTP Directory: /Society/wwwroot/"
          echo ""
          echo "NOTE: Run migrations manually via SSMS using script.sql"
