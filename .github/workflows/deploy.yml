name: Society Build .NET 8

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Society.sln

      - name: Build
        run: dotnet build Society.sln --no-restore --configuration Release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish SocietyApp/SocietyApp.csproj --configuration Release --output ./publish

      - name: Upload published artifact
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: ./publish

  ftp-deploy:
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Download published artifact
        uses: actions/download-artifact@v4
        with:
          name: published-app
          path: ./publish

      - name: Prepare deployment files
        run: |
          echo "Configuring production settings..."
          sed -i 's/#{DB_SERVER}#/${{ secrets.DB_SERVER }}/g' ./publish/appsettings.Production.json
          sed -i 's/#{DB_USERNAME}#/${{ secrets.DB_USERNAME }}/g' ./publish/appsettings.Production.json
          sed -i 's/#{DB_PASSWORD}#/${{ secrets.DB_PASSWORD }}/g' ./publish/appsettings.Production.json

          echo "Creating log directory..."
          mkdir -p ./publish/logs

          echo "Deployment files prepared"

      - name: Put site in maintenance mode
        run: |
          cat << 'EOF' > app_offline.htm
          <!doctype html>
          <html>
          <head><meta charset="utf-8"><title>Maintenance</title></head>
          <body style="font-family:Segoe UI,Arial,sans-serif;padding:40px;max-width:700px;margin:auto;">
            <h1>We will be back shortly</h1>
            <p>System update in progress. Please try again in a few minutes.</p>
          </body>
          </html>
          EOF

          curl --fail --ftp-create-dirs \
            -T ./app_offline.htm \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            "ftp://${{ secrets.FTP_SERVER }}/ikhayasociety.co.za/wwwroot/app_offline.htm"

      - name: Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /ikhayasociety.co.za/wwwroot/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Remove maintenance mode file
        if: always()
        run: |
          curl --fail --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            --quote "DELE /ikhayasociety.co.za/wwwroot/app_offline.htm" \
            "ftp://${{ secrets.FTP_SERVER }}/"

      - name: Deployment Summary
        run: |
          echo "========================================="
          echo "SOCIETY APP DEPLOYMENT COMPLETED"
          echo "========================================="
          echo ""
          echo "Application URL: http://ikhayasociety.co.za/wwwroot/"
          echo "FTP Directory: /wwwroot/"
          echo ""
          echo "NOTE: Run migrations manually via SSMS using script.sql"
